<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="500" height="240">
  <style>
    circle { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #333; text-anchor: middle; }
    .small { font-size: 11px; fill: #666; }
    line { stroke: #888; stroke-width: 1.5; }
    .layer-label { font-size: 14px; font-weight: bold; fill: #444; }
  </style>

  <!-- layer labels -->
  <text x="80" y="220" class="layer-label">输入层</text>
  <text x="250" y="220" class="layer-label">隐藏层</text>
  <text x="420" y="220" class="layer-label">输出层</text>

  <!-- input nodes -->
  <circle cx="80" cy="80" r="22" />
  <text x="80" y="85">x₁</text>
  <circle cx="80" cy="160" r="22" />
  <text x="80" y="165">x₂</text>

  <!-- hidden nodes -->
  <circle cx="250" cy="55" r="22" />
  <text x="250" y="60">a₁</text>
  <circle cx="250" cy="120" r="22" />
  <text x="250" y="125">a₂</text>
  <circle cx="250" cy="185" r="22" />
  <text x="250" y="190">a₃</text>

  <!-- output node -->
  <circle cx="420" cy="120" r="22" />
  <text x="420" y="125">y</text>

  <!-- connections input to hidden -->
  <line x1="102" y1="80" x2="228" y2="55" />
  <line x1="102" y1="80" x2="228" y2="120" />
  <line x1="102" y1="80" x2="228" y2="185" />
  <line x1="102" y1="160" x2="228" y2="55" />
  <line x1="102" y1="160" x2="228" y2="120" />
  <line x1="102" y1="160" x2="228" y2="185" />

  <!-- connections hidden to output -->
  <line x1="272" y1="55" x2="398" y2="120" />
  <line x1="272" y1="120" x2="398" y2="120" />
  <line x1="272" y1="185" x2="398" y2="120" />

  <!-- formulas -->
  <text x="250" y="25" class="small">z^[1] = W^[1] x + b^[1]</text>
  <text x="420" y="90" class="small">z^[2] = W^[2] a^[1] + b^[2]</text>
</svg>
