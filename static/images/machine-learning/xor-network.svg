<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <style>
    circle { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #333; text-anchor: middle; }
    .small { font-size: 11px; fill: #666; }
    line { stroke: #888; stroke-width: 1.5; }
    .layer-label { font-size: 14px; font-weight: bold; fill: #444; }
  </style>

  <!-- layer labels -->
  <text x="70" y="180" class="layer-label">输入层</text>
  <text x="250" y="180" class="layer-label">隐藏层</text>
  <text x="430" y="180" class="layer-label">输出层</text>

  <!-- inputs -->
  <circle cx="70" cy="70" r="22" />
  <text x="70" y="75">x₁</text>
  <circle cx="70" cy="130" r="22" />
  <text x="70" y="135">x₂</text>

  <!-- hidden -->
  <circle cx="250" cy="60" r="25" />
  <text x="250" y="65" font-size="12px">or-like</text>
  <circle cx="250" cy="140" r="25" />
  <text x="250" y="145" font-size="12px">nand-like</text>

  <!-- output -->
  <circle cx="430" cy="100" r="25" />
  <text x="430" y="105">XOR</text>

  <!-- connections -->
  <line x1="92" y1="70" x2="225" y2="60" />
  <line x1="92" y1="70" x2="225" y2="140" />
  <line x1="92" y1="130" x2="225" y2="60" />
  <line x1="92" y1="130" x2="225" y2="140" />

  <line x1="275" y1="60" x2="405" y2="100" />
  <line x1="275" y1="140" x2="405" y2="100" />

  <!-- matrix dims -->
  <text x="250" y="30" class="small">W^[1] ∈ ℝ^(2×2), b^[1] ∈ ℝ²</text>
  <text x="430" y="70" class="small">W^[2] ∈ ℝ^(1×2), b^[2] ∈ ℝ</text>
</svg>
