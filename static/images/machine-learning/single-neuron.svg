<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <style>
    circle { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; fill: #333; }
    .small { font-size: 12px; fill: #666; }
    line { stroke: #666; stroke-width: 2; }
    .arrow { marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- inputs -->
  <circle cx="60" cy="60" r="25" />
  <text x="60" y="65" text-anchor="middle">x₁</text>

  <circle cx="60" cy="140" r="25" />
  <text x="60" y="145" text-anchor="middle">x₂</text>

  <!-- weights -->
  <line x1="85" y1="60" x2="190" y2="100" class="arrow" />
  <text x="120" y="65" class="small">w₁</text>

  <line x1="85" y1="140" x2="190" y2="100" class="arrow" />
  <text x="120" y="150" class="small">w₂</text>

  <!-- bias -->
  <line x1="60" y1="100" x2="190" y2="100" class="arrow" stroke-dasharray="5,5" />
  <text x="60" y="95" class="small">b</text>

  <!-- neuron -->
  <circle cx="220" cy="100" r="35" />
  <text x="220" y="105" text-anchor="middle" font-size="13px">Σ + σ</text>

  <!-- output -->
  <line x1="255" y1="100" x2="340" y2="100" class="arrow" />
  <circle cx="365" cy="100" r="25" />
  <text x="365" y="105" text-anchor="middle">y</text>
  <text x="300" y="90" class="small">z = w·x + b</text>
</svg>
