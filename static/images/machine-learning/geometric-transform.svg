<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" width="640" height="240" style="background-color: #f8f9fa; border-radius: 6px;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444444" />
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="640" height="240" fill="#f8f9fa" rx="6" />

  <!-- original space -->
  <text x="110" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">原始空间</text>
  <line x1="40" y1="200" x2="180" y2="200" stroke="#222222" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="40" y1="200" x2="40" y2="60" stroke="#222222" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="178" y="218" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#333333" text-anchor="middle">x₁</text>
  <text x="32" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#333333" text-anchor="middle">x₂</text>

  <!-- grid lines -->
  <line x1="40" y1="130" x2="180" y2="130" stroke="#d0d0d0" stroke-width="1" />
  <line x1="110" y1="60" x2="110" y2="200" stroke="#d0d0d0" stroke-width="1" />

  <!-- points: class0 = (0,0) and (1,1); class1 = (0,1) and (1,0) -->
  <circle cx="40" cy="200" r="8" fill="#007acc" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="40" cy="60" r="8" fill="#e74c3c" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="180" cy="200" r="8" fill="#e74c3c" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="180" cy="60" r="8" fill="#007acc" stroke="#ffffff" stroke-width="2.5" />

  <text x="110" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#555555" text-anchor="middle">无法用一条直线分开</text>

  <!-- arrow -->
  <line x1="215" y1="120" x2="305" y2="120" stroke="#444444" stroke-width="2" marker-end="url(#arrow)" />
  <text x="260" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#555555" text-anchor="middle">神经网络变换</text>

  <!-- transformed space -->
  <text x="430" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">变换后的空间</text>
  <line x1="350" y1="200" x2="510" y2="200" stroke="#222222" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="350" y1="200" x2="350" y2="60" stroke="#222222" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="505" y="218" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#333333" text-anchor="middle">h₁</text>
  <text x="340" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#333333" text-anchor="middle">h₂</text>

  <!-- grid lines -->
  <line x1="350" y1="130" x2="510" y2="130" stroke="#d0d0d0" stroke-width="1" />
  <line x1="430" y1="60" x2="430" y2="200" stroke="#d0d0d0" stroke-width="1" />

  <!-- points after transform: class0 left, class1 right -->
  <circle cx="375" cy="100" r="8" fill="#007acc" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="380" cy="155" r="8" fill="#007acc" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="485" cy="85" r="8" fill="#e74c3c" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="490" cy="145" r="8" fill="#e74c3c" stroke="#ffffff" stroke-width="2.5" />

  <!-- decision boundary -->
  <line x1="430" y1="50" x2="430" y2="210" stroke="#27ae60" stroke-width="3" stroke-dasharray="6,4" />
  <text x="500" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">决策边界：一条直线</text>

  <!-- arrow 2 -->
  <line x1="535" y1="120" x2="610" y2="120" stroke="#444444" stroke-width="2" marker-end="url(#arrow)" />

  <!-- output -->
  <text x="620" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#555555" text-anchor="start">分类完成</text>
</svg>
